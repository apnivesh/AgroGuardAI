<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="flex items-center justify-center p-6">
    <div class="glass p-10 w-full max-w-md animate__animated animate__fadeInUp">
        <h2 class="text-3xl font-black text-green-700 mb-6 text-center">Login to AgroGuard</h2>
        <form action="/login" method="POST" class="space-y-4">
            <input type="email" name="email" placeholder="Email Address" required 
                   class="w-full p-4 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-green-500 outline-none">
            
            <input type="password" name="password" placeholder="Password" required 
                   class="w-full p-4 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-green-500 outline-none">
            
            <button type="submit" class="w-full btn-primary py-4 rounded-2xl font-bold shadow-lg">
                Sign In
            </button>
        </form>
        <p class="mt-6 text-center text-gray-500 text-sm">New here? <a href="/register" class="text-green-600 font-bold">Register</a></p>
    </div>
</body>
</html>
